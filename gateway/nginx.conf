events {
    worker_connections 1024;
}

http {
    # Resolver real del contenedor (inyectado por docker-entrypoint.sh desde
    # /etc/resolv.conf). Los upstreams de abajo se resuelven por petición
    # usando este resolver -- no una sola vez al cargar la config -- para
    # que un DNS que tarde en estar listo (o un hostname de Railway que
    # cambie) no tumbe el gateway entero con "host not found in upstream".
    resolver ${RESOLVER} valid=10s;

    # El edge de Railway (railway-hikari) agrega sus propios headers/cookies
    # de tracing al reenviar la petición al contenedor -- con los límites
    # por defecto de nginx (8k) eso alcanza a rechazar peticiones normales
    # con "400 Request Header Or Cookie Too Large" antes de que lleguen a
    # proxy_pass. Se amplía el buffer para dar margen a esos headers extra.
    client_header_buffer_size 4k;
    large_client_header_buffers 4 32k;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen ${PORT};

        # payment/ (Stripe: suscripciones, ads, connect, órdenes) vive en su
        # propio servicio de Railway y expone rutas bajo el mismo prefijo
        # /api/v1/... que api/ -- nginx hace match por el prefijo literal
        # más largo, así que estos bloques (más específicos) ganan sobre el
        # /api/ genérico de abajo sin importar el orden en el archivo.
        location /api/v1/subscriptions {
            set $upstream_payment steadfast-kindness.railway.internal:8005;
            proxy_pass http://$upstream_payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/ads {
            set $upstream_payment steadfast-kindness.railway.internal:8005;
            proxy_pass http://$upstream_payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/connect {
            set $upstream_payment steadfast-kindness.railway.internal:8005;
            proxy_pass http://$upstream_payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/orders {
            set $upstream_payment steadfast-kindness.railway.internal:8005;
            proxy_pass http://$upstream_payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $upstream_api vaultback.railway.internal:8080;
            proxy_pass http://$upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            set $upstream_realtime realtime-production-7731.up.railway.app:443;
            proxy_pass https://$upstream_realtime;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host realtime-production-7731.up.railway.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        location / {
            return 404;
        }
    }
}
