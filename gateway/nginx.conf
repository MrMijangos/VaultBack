events {
    worker_connections 1024;
}

http {
    upstream vault_api {
        server vaultback.railway.internal:8080;
    }

    upstream vault_realtime {
        server realtime-production-7731.up.railway.app:443;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://vault_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            proxy_pass https://vault_realtime;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host realtime-production-7731.up.railway.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        location / {
            return 404;
        }
    }
}
